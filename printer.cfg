[mcu]
# Microcontrolador principal - STM32H723
# El serial se obtiene con: ls /dev/serial/by-id/
# Conectar via USB a la BTT Pi/CB1
serial: /dev/serial/by-id/usb-Klipper_stm32h723xx_15000F001051313531383332-if00

[printer]
# Configuración general de la impresora
# Cinemática cartesiana (ejes X/Y/Z independientes)
kinematics: cartesian
max_velocity: 300          # Velocidad máxima de movimiento (mm/s)
max_accel: 3000            # Aceleración máxima (mm/s²)
max_z_velocity: 5          # Velocidad máxima eje Z (mm/s) - lento para precisión
max_z_accel: 100           # Aceleración máxima eje Z (mm/s²)

########################################
# EJE X - MOTOR 0 (TMC2209)
# Driver: TMC2209 en modo UART
# Endstop: final de carrera físico en PG6
# Distancia por vuelta: 40mm (polea GT2 20T)
########################################
[stepper_x]
step_pin: PF13
dir_pin: PF12
enable_pin: !PF14
microsteps: 16
rotation_distance: 40      # 20 dientes × 2mm paso = 40mm por vuelta
endstop_pin: ^PG6          # ^ = pullup activado
position_endstop: 0        # El home de X está en la posición 0
position_max: 1000         # Ancho máximo de la cama en mm
homing_speed: 50           # Velocidad de homing (mm/s)

[tmc2209 stepper_x]
uart_pin: PC4
run_current: 0.600         # Corriente en movimiento (A RMS)
hold_current: 0.300        # Corriente en reposo (A RMS)
stealthchop_threshold: 999999  # StealthChop siempre activo (silencioso)

########################################
# EJE Y - MOTOR 2_1 + 2_2 (TMC2209)
# Driver: UN solo TMC2209 azul en MOTOR 2_1
# Dos motores NEMA en paralelo en 2_1 y 2_2
# Se mueven siempre juntos con un solo driver
# Endstop: final de carrera físico en PG9
# Distancia por vuelta: 40mm (polea GT2 20T)
########################################
[stepper_y]
step_pin: PF11             # MOTOR 2_1
dir_pin: PG3
enable_pin: !PG5
microsteps: 16
rotation_distance: 40      # 20 dientes × 2mm paso = 40mm por vuelta
endstop_pin: ^PG9          # ^ = pullup activado
position_endstop: 0        # El home de Y está en la posición 0
position_max: 1000         # Profundidad máxima de la cama en mm
homing_speed: 50           # Velocidad de homing (mm/s)

[tmc2209 stepper_y]
uart_pin: PC6              # UART del slot MOTOR 2_1
run_current: 1.000
hold_current: 0.500
stealthchop_threshold: 999999

########################################
# EJE Z - CONFIGURACIÓN DUAL (TMC5160-T)
# Dos motores NEMA 23 independientes para
# nivelar la cama automáticamente con Z_TILT_ADJUST
# Driver: TMC5160 rojo de alta potencia en modo SPI
# El endstop físico está reemplazado por el
# CR Touch como sonda virtual de Z
# Husillo: métrica 12, paso 2, 4 entradas → rotation_distance: 8
########################################

# MOTOR IZQUIERDO (Slot MOTOR 1)
[stepper_z]
step_pin: PG0              # MOTOR 1
dir_pin: PG1
enable_pin: !PF15
microsteps: 16
rotation_distance: 8       # Husillo T12: 2mm paso × 4 entradas = 8mm por vuelta
endstop_pin: probe:z_virtual_endstop  # CR Touch como endstop virtual
position_min: -2           # Permite bajar 2mm por debajo de 0 para calibrar Z offset
position_max: 1000         # Altura máxima de impresión en mm (1 metro)
homing_speed: 10           # Velocidad lenta para precisión en Z (mm/s)

[tmc5160 stepper_z]
cs_pin: PD11               # Chip Select SPI - MOTOR 1
spi_software_miso_pin: PA6
spi_software_mosi_pin: PA7
spi_software_sclk_pin: PA5
run_current: 2.000         # Corriente en movimiento (A RMS) - NEMA 23
hold_current: 1.000        # Corriente en reposo (A RMS)
stealthchop_threshold: 999999
driver_TOFF: 3
driver_HSTRT: 4
driver_HEND: 3

# MOTOR DERECHO (Slot MOTOR 5)
# NOTA: Slot MOTOR 3 original defectuoso, movido a MOTOR 5
[stepper_z1]
step_pin: PC13             # MOTOR 5
dir_pin: !PF0              # ! invertido para girar en la misma dirección que Z
enable_pin: !PF1
microsteps: 16
rotation_distance: 8       # Mismo husillo metrica 12 de paso 2 y 4 entradas

[tmc5160 stepper_z1]
cs_pin: PE4                # Chip Select SPI - MOTOR 5
spi_software_miso_pin: PA6
spi_software_mosi_pin: PA7
spi_software_sclk_pin: PA5
run_current: 2.000
hold_current: 1.000
stealthchop_threshold: 999999
driver_TOFF: 3
driver_HSTRT: 4
driver_HEND: 3

########################################
# ENDSTOP DE SEGURIDAD Z MÁXIMO - T3 (PF7)
# Final de carrera en el tope superior del eje Z
# Usa el conector T3 reconvertido en entrada digital
# Activa M112 (parada de emergencia) si el eje sube demasiado
########################################
[gcode_button endstop_z_max]
pin: ~PF7                  # J49 - pulldown (~), NO pullup (^) - con ^ no funcionaba
press_gcode:
  M118 EMERGENCIA - Endstop Z maximo activado
  M112

########################################
# EXTRUSOR - ORBITER SO3 (Slot MOTOR 4)
# Motor: LDO-36STH20-1004AHG(OBT)
# Termistor: ATC Semitec 104NT-4-R025H42G
# Calentador: 24V 72W cerámico
# Relación de reducción: 7.5:1
# Driver TMC2209 con StealthChop DESACTIVADO
# para máxima respuesta del extrusor
########################################
[extruder]
step_pin: PF9
dir_pin: PF10
enable_pin: !PG2
microsteps: 16
full_steps_per_rotation: 200
rotation_distance: 4.637   # Calibrado para el SO3 (oficial: 4.69)
nozzle_diameter: 0.400     # Boquilla estándar 0.4mm
filament_diameter: 1.750   # Filamento estándar 1.75mm
max_extrude_only_distance: 500
max_extrude_only_velocity: 120
heater_pin: PA3            # Pin del calentador cerámico 24V 72W
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: PF4
min_temp: 0
max_temp: 300
min_extrude_temp: 170      # No extruye por debajo de 170°C (seguridad)

[tmc2209 extruder]
uart_pin: PF2
run_current: 0.850         # Corriente máxima recomendada SO3 (A RMS)
hold_current: 0.100
stealthchop_threshold: 0   # StealthChop DESACTIVADO - mejor respuesta extrusor

########################################
# VENTILADOR HEATSINK SO3 (Slot FAN2 - PD12)
# Ventilador frameless 24V integrado en el SO3
# Cableado: Rojo → VCC FAN2 / Negro → GND FAN2
# Amarillo (señal PWM) → no conectado
########################################
[heater_fan hotend_fan]
pin: PD12
heater: extruder
heater_temp: 50.0          # Temperatura de activación (°C)
fan_speed: 1.0             # Siempre a máxima velocidad cuando activo

########################################
# VENTILADOR DE CAPA (FAN3 - J53 - PD13)
# Controlado por el slicer con M106/M107
########################################
[fan]
pin: PD13                  # FAN3 - J53

########################################
# CR TOUCH (Creality ALT04)
# Cableado:
# Azul    → PB7 (sensor_pin)
# Rojo    → GND
# Amarillo→ PB6 (control_pin)
# Negro   → 5V
# Blanco  → GND
########################################
[bltouch]
sensor_pin: ^PB7           # ^ = pullup activado
control_pin: PB6
pin_up_touch_mode_reports_triggered: False
x_offset: 0               # Offset X entre boquilla y sonda - calibrar físicamente
y_offset: 0               # Offset Y entre boquilla y sonda - calibrar físicamente
z_offset: 0               # Offset Z - se calibra con PROBE_CALIBRATE
speed: 5.0                 # Velocidad de sondeo (mm/s)
lift_speed: 10.0           # Velocidad de subida entre sondeos (mm/s)
samples: 2                 # Número de muestras por punto para mayor precisión
sample_retract_dist: 5.0   # Distancia de retracción entre muestras (mm)

########################################
# HOMING SEGURO CON CR TOUCH
########################################
[safe_z_home]
home_xy_position: 500, 500 # Centro de la cama 1000x1000
speed: 100
z_hop: 10                  # Sube 10mm antes de moverse (seguridad)
z_hop_speed: 10

########################################
# MALLA DE NIVELACIÓN (BED MESH)
########################################
[bed_mesh]
speed: 100
horizontal_move_z: 5
mesh_min: 30, 30
mesh_max: 970, 970
probe_count: 5, 5          # Cuadrícula 5x5 = 25 puntos de sondeo
mesh_pps: 2, 2
algorithm: bicubic         # Interpolación para superficies complejas

########################################
# SENSOR DE FILAMENTO SO3
# Cableado:
# Marrón (FS)  → PG11 (filament switch)
# Gris   (FTU) → PG10 (filament unload button)
########################################
[filament_switch_sensor sensor_filamento]
switch_pin: ^PG11
pause_on_runout: True
runout_gcode:
  M118 Filamento agotado - pausando impresion

[gcode_button boton_descarga]
pin: ^!PG10                # Botón físico de descarga en el SO3
press_gcode:
release_gcode:
  M118 Boton descarga pulsado
  filament_unload_init

########################################
# NIVELACIÓN AUTOMÁTICA DUAL Z (Z_TILT)
########################################
[z_tilt]
z_positions:
    -50, 150               # Posición X del husillo izquierdo
    350, 150               # Posición X del husillo derecho
points:
    30, 150                # Punto de sondeo lado izquierdo
    270, 150               # Punto de sondeo lado derecho
speed: 50
horizontal_move_z: 5

[force_move]
enable_force_move: True    # Permite mover ejes sin homing (para pruebas)

########################################
# CAMA CALEFACTADA
# PENDIENTE: instalar termistor en cama
########################################
[heater_bed]
heater_pin: PA1
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PF3
control: watermark
min_temp: -110             # Muy bajo porque aún no hay termistor real instalado
max_temp: 130

########################################
# TIMEOUT DE INACTIVIDAD
########################################
[idle_timeout]
timeout: 600               # 600 segundos = 10 minutos
gcode:
  TURN_OFF_HEATERS
  M84

########################################
# UTILIDADES Y MACROS
########################################
[virtual_sdcard]
path: ~/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[pause_resume]
[display_status]
[respond]

[gcode_macro PREPARAR_TEST]
gcode:
  SET_KINEMATIC_POSITION X=100 Y=100 Z=10
  M117 Todos los sistemas operativos

[gcode_macro filament_unload_init]
gcode:
  {% if printer.print_stats.state != "printing" %}
    M118 Iniciando descarga de filamento...
    M109 S185
    G92 E0
    G1 E-5 F3000           # Retracción rápida inicial 5mm
    G1 E-25 F300           # Retracción lenta 25mm
    M104 S0
    M118 Filamento descargado correctamente
  {% else %}
    M118 No se puede descargar mientras se imprime!
  {% endif %}

[gcode_macro PAUSE]
rename_existing: BASE_PAUSE
gcode:
  BASE_PAUSE

[gcode_macro RESUME]
rename_existing: BASE_RESUME
gcode:
  BASE_RESUME

[gcode_macro CANCEL_PRINT]
rename_existing: BASE_CANCEL_PRINT
gcode:
  TURN_OFF_HEATERS
  BASE_CANCEL_PRINT

[gcode_macro START_PRINT]
gcode:
  {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
  {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(210)|float %}
  M140 S{BED_TEMP}         # Empieza a calentar la cama (sin esperar)
  M109 S{EXTRUDER_TEMP}    # Calienta el hotend y espera
  M190 S{BED_TEMP}         # Espera a que la cama llegue a temperatura
  G28                      # Home en todos los ejes
  Z_TILT_ADJUST            # Nivela los dos motores Z
  BED_MESH_CALIBRATE       # Mapea la superficie de la cama
  G92 E0
  G1 Z5 F3000
  G1 X10 Y10 F5000
  G1 Z0.3 F300
  G92 E0
  M117 Imprimiendo...

[gcode_macro END_PRINT]
gcode:
  M400                     # Espera a que terminen los movimientos pendientes
  G92 E0
  G1 E-5 F3000             # Retracción final para evitar stringing
  TURN_OFF_HEATERS
  G28 X Y                  # Home XY para apartar el cabezal
  M84                      # Desactiva motores
  M117 Impresion completada

